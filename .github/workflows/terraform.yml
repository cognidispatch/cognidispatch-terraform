name: "Terraform Infrastructure Pipeline"

# ─────────────────────────────────────────────────────────────────
# Triggers:
#   push to main           → validate → plan → apply
#   pull_request to main   → validate → plan  (no apply)
#   workflow_dispatch      → validate → plan → apply/destroy
# ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "modules/**"
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - "modules/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

# ─────────────────────────────────────────────────────────────────
# OIDC permissions — no client secret needed
# ─────────────────────────────────────────────────────────────────
permissions:
  id-token: write       # Mint OIDC token for Azure auth
  contents: read        # Checkout code
  pull-requests: write  # Post plan comments on PRs

# ─────────────────────────────────────────────────────────────────
# Shared env — inherited by all jobs
# ─────────────────────────────────────────────────────────────────
env:
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC:        "true"
  KV_NAME:             "cognidispatch-kv"
  RG_NAME:             "test-rg"
  TF_VERSION:          "~1.7"

# ═════════════════════════════════════════════════════════════════
jobs:
# ─────────────────────────────────────────────────────────────────
# JOB 1 — Validate: fmt + init + validate
# Runs on every trigger. No apply logic here.
# ─────────────────────────────────────────────────────────────────
  validate:
    name: "🔍 Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Whitelist Runner IP in Key Vault Firewall
        id: kv_ip
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=$IP" >> $GITHUB_OUTPUT
          az keyvault network-rule add \
            --name $KV_NAME \
            --resource-group $RG_NAME \
            --ip-address "$IP"
          echo "✅ Whitelisted $IP — waiting for propagation..."
          sleep 10

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true   # warn but don't block

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Remove Runner IP from Key Vault Firewall
        if: always()
        run: |
          az keyvault network-rule remove \
            --name $KV_NAME \
            --resource-group $RG_NAME \
            --ip-address "${{ steps.kv_ip.outputs.runner_ip }}" || true
          echo "🧹 Removed ${{ steps.kv_ip.outputs.runner_ip }} from KV firewall"

# ─────────────────────────────────────────────────────────────────
# JOB 2 — Plan: terraform plan + upload artifact + PR comment
# ─────────────────────────────────────────────────────────────────
  plan:
    name: "📋 Plan"
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Whitelist Runner IP in Key Vault Firewall
        id: kv_ip
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=$IP" >> $GITHUB_OUTPUT
          az keyvault network-rule add \
            --name $KV_NAME \
            --resource-group $RG_NAME \
            --ip-address "$IP"
          echo "✅ Whitelisted $IP — waiting for propagation..."
          sleep 10

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        run: |
          if [[ "${{ github.event.name }}" == "workflow_dispatch" && "${{ inputs.action }}" == "destroy" ]]; then
            echo "Generating DESTROY plan..."
            terraform plan \
              -destroy \
              -no-color \
              -input=false \
              -var="smtp_user=${{ secrets.SMTP_USER }}" \
              -var="smtp_pass=${{ secrets.SMTP_PASS }}" \
              -out=tfplan 2>&1 | tee plan_output.txt
          else
            echo "Generating APPLY plan..."
            terraform plan \
              -no-color \
              -input=false \
              -var="smtp_user=${{ secrets.SMTP_USER }}" \
              -var="smtp_pass=${{ secrets.SMTP_PASS }}" \
              -out=tfplan 2>&1 | tee plan_output.txt
          fi

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

      - name: Post Plan Summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = planOutput.length > maxLen
              ? planOutput.slice(0, maxLen) + '\n\n... (truncated)'
              : planOutput;

            const body = `## 🏗️ Terraform Plan Results

            **Format:** \`${{ steps.fmt.outcome || 'skipped' }}\` | **Init:** \`success\` | **Plan:** \`${{ steps.plan.outcome }}\`

            <details><summary>📋 Show Full Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            > 🔒 Run by @${{ github.actor }} on \`${{ github.head_ref }}\`
            > ⚠️ Merging this PR will trigger **terraform apply** automatically.`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.user.type === 'Bot' && c.body.includes('Terraform Plan Results')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Remove Runner IP from Key Vault Firewall
        if: always()
        run: |
          az keyvault network-rule remove \
            --name $KV_NAME \
            --resource-group $RG_NAME \
            --ip-address "${{ steps.kv_ip.outputs.runner_ip }}" || true
          echo "🧹 Removed ${{ steps.kv_ip.outputs.runner_ip }} from KV firewall"

# ─────────────────────────────────────────────────────────────────
# JOB 3 — Apply: download plan artifact + terraform apply
# Only on: push to main  OR  workflow_dispatch action == 'apply'
# ─────────────────────────────────────────────────────────────────
  apply:
    name: "🚀 Apply"
    runs-on: ubuntu-latest
    needs: [plan]
    environment: production
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Whitelist Runner IP in Key Vault Firewall
        id: kv_ip
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=$IP" >> $GITHUB_OUTPUT
          az keyvault network-rule add \
            --name $KV_NAME \
            --resource-group $RG_NAME \
            --ip-address "$IP"
          echo "✅ Whitelisted $IP — waiting for propagation..."
          sleep 10

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Remove Runner IP from Key Vault Firewall
        if: always()
        run: |
          az keyvault network-rule remove \
            --name $KV_NAME \
            --resource-group $RG_NAME \
            --ip-address "${{ steps.kv_ip.outputs.runner_ip }}" || true
          echo "🧹 Removed ${{ steps.kv_ip.outputs.runner_ip }} from KV firewall"

# ─────────────────────────────────────────────────────────────────
# JOB 4 — Destroy: download plan artifact + terraform apply (destroy plan)
# Only on: workflow_dispatch action == 'destroy'
# ─────────────────────────────────────────────────────────────────
  destroy:
    name: "💥 Destroy"
    runs-on: ubuntu-latest
    needs: [plan]
    environment: production
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Whitelist Runner IP in Key Vault Firewall
        id: kv_ip
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=$IP" >> $GITHUB_OUTPUT
          az keyvault network-rule add \
            --name $KV_NAME \
            --resource-group $RG_NAME \
            --ip-address "$IP"
          echo "✅ Whitelisted $IP — waiting for propagation..."
          sleep 10

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      - name: Terraform Destroy (Apply Destroy Plan)
        run: terraform apply -auto-approve -input=false tfplan

      - name: Remove Runner IP from Key Vault Firewall
        if: always()
        run: |
          az keyvault network-rule remove \
            --name $KV_NAME \
            --resource-group $RG_NAME \
            --ip-address "${{ steps.kv_ip.outputs.runner_ip }}" || true
          echo "🧹 Removed ${{ steps.kv_ip.outputs.runner_ip }} from KV firewall"
